<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡通动物翻牌游戏</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 主界面 -->
    <div id="main-menu" class="game-container active">
        <div class="sun"></div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <h1>卡通动物翻牌游戏</h1>
        <p class="game-description">挑战你的记忆力，完成所有关卡！</p>
        <div class="menu-buttons">
            <button id="start-game-btn">开始游戏</button>
        </div>
    </div>
    
    <!-- 游戏界面 -->
    <div id="game-screen" class="game-container">
        <div class="sun"></div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <h1 id="level-title">第一关</h1>
        
        <div class="game-stats">
            <div class="stat">
                <span class="label">翻牌次数:</span>
                <span id="flip-count">0</span>
            </div>
            <div class="stat">
                <span class="label">用时:</span>
                <span id="timer">00:00</span>
            </div>
        </div>
        
        <div class="game-controls">
            <button id="music-btn" class="music-btn music-off"></button>
            <button id="exit-to-menu">返回主菜单</button>
        </div>
        
        <div class="game-board" id="game-board">
            <!-- 卡片将通过JavaScript动态生成 -->
        </div>
        
        <div id="win-message" class="win-message">
            <h2>恭喜你赢了！</h2>
            <p>用时: <span id="final-time">00:00</span></p>
            <p>翻牌次数: <span id="final-flips">0</span></p>
            <div class="win-buttons">
                <button id="next-level-btn">下一关</button>
                <button id="play-again-btn">再玩一次</button>
                <button id="win-exit-btn">返回主菜单</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
