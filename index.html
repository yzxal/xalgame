<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡通动物翻牌游戏</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <h1>卡通动物翻牌游戏</h1>
        
        <div class="game-stats">
            <div class="stat">
                <span class="label">翻牌次数:</span>
                <span id="flip-count">0</span>
            </div>
            <div class="stat">
                <span class="label">用时:</span>
                <span id="timer">00:00</span>
            </div>
        </div>
        
        <div class="game-controls">
            <button id="start-btn">开始游戏</button>
            <button id="restart-btn">重新开始</button>
        </div>
        
        <div class="game-board">
            <!-- 卡片将通过JavaScript动态生成 -->
        </div>
        
        <div id="win-message" class="win-message">
            <h2>恭喜你赢了！</h2>
            <p>用时: <span id="final-time">00:00</span></p>
            <p>翻牌次数: <span id="final-flips">0</span></p>
            <button id="play-again-btn">再玩一次</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
